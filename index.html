<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="フラッピートリ — 夕暮れの空を舞う小鳥を、タップとスペースキーで導く横スクロールアクション。土管をくぐってベスト記録に挑もう。">
<title>フラッピートリ | 夕暮れの空を、とりが ゆく。</title>
<style>
  :root{
    --ink:#fff8f0;
    --gold:#ffd166;
    --rose:#f6a5a5;
    --night:#241238;
    --panel:rgba(28,14,46,.78);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    overflow:hidden;
    background:var(--night);
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","BIZ UDPGothic","Yu Gothic",YuGothic,"Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);
  }
  #stage{ position:fixed; inset:0; }
  #game{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    pointer-events:none;
    padding:24px;
    transition:opacity .35s ease;
  }
  .screen.hidden{ opacity:0; visibility:hidden; }

  /* ---- タイトル画面 ---- */
  #titleScreen h1{
    font-size:clamp(40px, 11vw, 84px);
    font-weight:900;
    letter-spacing:.06em;
    line-height:1.1;
    color:var(--ink);
    text-shadow:0 3px 0 rgba(90,40,80,.55), 0 10px 30px rgba(20,8,40,.6);
    display:flex;
  }
  #titleScreen h1 span{
    display:inline-block;
    animation:floatChar 2.6s ease-in-out infinite;
  }
  #titleScreen h1 span:nth-child(2n){ color:var(--gold); }
  #titleScreen h1 span:nth-child(1){ animation-delay:0s; }
  #titleScreen h1 span:nth-child(2){ animation-delay:.12s; }
  #titleScreen h1 span:nth-child(3){ animation-delay:.24s; }
  #titleScreen h1 span:nth-child(4){ animation-delay:.36s; }
  #titleScreen h1 span:nth-child(5){ animation-delay:.48s; }
  #titleScreen h1 span:nth-child(6){ animation-delay:.6s; }
  #titleScreen h1 span:nth-child(7){ animation-delay:.72s; }
  @keyframes floatChar{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-9px); }
  }
  #titleScreen .sub{
    margin-top:14px;
    font-size:clamp(13px, 3.4vw, 17px);
    letter-spacing:.28em;
    color:rgba(255,240,225,.85);
    text-shadow:0 2px 12px rgba(20,8,40,.7);
  }
  #titleScreen .bestChip{
    margin-top:26px;
    padding:8px 22px;
    border-radius:999px;
    background:var(--panel);
    border:1px solid rgba(255,209,102,.4);
    font-size:14px;
    letter-spacing:.14em;
    box-shadow:0 6px 24px rgba(10,4,24,.45);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  #titleScreen .bestChip b{
    color:var(--gold);
    font-size:20px;
    margin-left:.4em;
    font-variant-numeric:tabular-nums;
  }
  .hint{
    margin-top:34px;
    font-size:clamp(14px, 3.8vw, 18px);
    font-weight:700;
    letter-spacing:.16em;
    color:var(--ink);
    text-shadow:0 2px 10px rgba(20,8,40,.8);
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.45; transform:scale(.97); }
  }
  .keysNote{
    margin-top:14px;
    font-size:11px;
    letter-spacing:.12em;
    color:rgba(255,240,225,.55);
  }

  /* ---- HUD ---- */
  #hudScore{
    position:absolute;
    top:max(28px, env(safe-area-inset-top));
    left:0; right:0;
    text-align:center;
    font-size:clamp(48px, 12vw, 76px);
    font-weight:900;
    font-variant-numeric:tabular-nums;
    color:var(--ink);
    text-shadow:0 4px 0 rgba(90,40,80,.5), 0 12px 30px rgba(20,8,40,.55);
    pointer-events:none;
    opacity:0;
    transition:opacity .3s ease;
  }
  #hudScore.show{ opacity:1; }
  #hudScore.bump{ animation:bump .25s ease; }
  @keyframes bump{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.18); }
    100%{ transform:scale(1); }
  }

  /* ---- ゲームオーバー ---- */
  #overScreen .panel{
    background:var(--panel);
    border:1px solid rgba(255,209,102,.35);
    border-radius:26px;
    padding:34px 44px 30px;
    box-shadow:0 20px 60px rgba(8,2,20,.6);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    animation:panelIn .45s cubic-bezier(.2,1.4,.4,1);
    min-width:min(78vw, 340px);
  }
  @keyframes panelIn{
    from{ transform:translateY(26px) scale(.92); opacity:0; }
    to{ transform:translateY(0) scale(1); opacity:1; }
  }
  #overScreen h2{
    font-size:clamp(24px, 6.4vw, 32px);
    font-weight:900;
    letter-spacing:.22em;
    color:var(--rose);
    text-shadow:0 2px 0 rgba(60,20,50,.6);
  }
  #overScreen .rows{
    margin-top:22px;
    display:flex;
    justify-content:center;
    gap:36px;
  }
  #overScreen .row .label{
    font-size:12px;
    letter-spacing:.3em;
    color:rgba(255,240,225,.6);
  }
  #overScreen .row .val{
    margin-top:6px;
    font-size:clamp(34px, 9vw, 46px);
    font-weight:900;
    font-variant-numeric:tabular-nums;
    color:var(--ink);
  }
  #overScreen .row.best .val{ color:var(--gold); }
  #newBadge{
    margin:18px auto 0;
    display:inline-block;
    padding:5px 18px;
    border-radius:999px;
    background:linear-gradient(135deg,#ffd166,#f79d65);
    color:#3a1c33;
    font-size:13px;
    font-weight:900;
    letter-spacing:.2em;
    box-shadow:0 4px 18px rgba(255,180,90,.45);
    animation:pulse 1.1s ease-in-out infinite;
  }
  #newBadge.hidden{ display:none; }
  #overScreen .hint{ margin-top:22px; }

  /* ---- ミュートボタン ---- */
  #muteBtn{
    position:absolute;
    top:max(16px, env(safe-area-inset-top));
    right:16px;
    width:46px; height:46px;
    border-radius:50%;
    border:1px solid rgba(255,240,225,.3);
    background:var(--panel);
    color:var(--ink);
    font-size:20px;
    cursor:pointer;
    z-index:10;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    transition:transform .15s ease, border-color .15s ease;
  }
  #muteBtn:hover{ transform:scale(1.08); border-color:var(--gold); }
  #muteBtn:active{ transform:scale(.94); }

  footer{
    position:absolute;
    bottom:max(8px, env(safe-area-inset-bottom));
    left:0; right:0;
    text-align:center;
    font-size:11px;
    letter-spacing:.1em;
    color:rgba(255,248,240,.45);
    pointer-events:none;
    z-index:5;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>

  <div id="hudScore">0</div>

  <div id="titleScreen" class="screen">
    <h1 aria-label="フラッピートリ"><span>フ</span><span>ラ</span><span>ッ</span><span>ピ</span><span>ー</span><span>ト</span><span>リ</span></h1>
    <p class="sub">ゆうぐれの空を、とりが ゆく。</p>
    <div class="bestChip">ベスト<b id="titleBest">0</b></div>
    <p class="hint">タップ / スペース で はばたく</p>
    <p class="keysNote">PC: Space・↑・W ではばたく ／ M でミュート</p>
  </div>

  <div id="overScreen" class="screen hidden">
    <div class="panel">
      <h2>ゲームオーバー</h2>
      <div class="rows">
        <div class="row">
          <div class="label">スコア</div>
          <div class="val" id="overScore">0</div>
        </div>
        <div class="row best">
          <div class="label">ベスト</div>
          <div class="val" id="overBest">0</div>
        </div>
      </div>
      <div id="newBadge" class="hidden">✦ 新記録 ✦</div>
      <p class="hint">タップ / スペース で もういちど</p>
    </div>
  </div>

  <button id="muteBtn" type="button" aria-label="サウンド切り替え">🔊</button>
  <footer>© 2026 masafykun</footer>
</div>

<script>
"use strict";
(function(){

  /* ========== 基本セットアップ ========== */
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var H = 800;            // 論理高さ(固定)
  var W = 450;            // 論理幅(リサイズで更新)
  var S = 1;              // 論理→実ピクセル倍率
  var GROUND_Y = H - 96;
  var skyGrad = null;

  function resize(){
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.round(window.innerWidth * dpr);
    canvas.height = Math.round(window.innerHeight * dpr);
    S = canvas.height / H;
    W = canvas.width / S;
    skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0.00, "#2e1b52");
    skyGrad.addColorStop(0.42, "#6f3f78");
    skyGrad.addColorStop(0.70, "#c96b6e");
    skyGrad.addColorStop(0.92, "#f0a35e");
  }
  window.addEventListener("resize", resize);
  resize();

  /* ========== 記録の保存 ========== */
  var KEY_BEST = "flappyTori.best";
  var KEY_MUTE = "flappyTori.mute";
  function loadNum(key){
    try{ var v = parseInt(localStorage.getItem(key), 10); return isNaN(v) ? 0 : v; }
    catch(e){ return 0; }
  }
  function save(key, val){
    try{ localStorage.setItem(key, String(val)); }catch(e){}
  }
  var best = loadNum(KEY_BEST);
  var muted = loadNum(KEY_MUTE) === 1;

  /* ========== サウンド (WebAudio合成) ========== */
  var AC = null, noiseBuf = null;
  function ac(){
    if(!AC){
      var Ctor = window.AudioContext || window.webkitAudioContext;
      if(!Ctor) return null;
      AC = new Ctor();
    }
    if(AC.state === "suspended") AC.resume();
    return AC;
  }
  function beep(delay, f1, f2, dur, type, vol){
    var c = ac(); if(!c) return;
    var t0 = c.currentTime + delay;
    var o = c.createOscillator();
    var g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f1, t0);
    if(f2 && f2 !== f1) o.frequency.exponentialRampToValueAtTime(f2, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  function noise(delay, dur, vol){
    var c = ac(); if(!c) return;
    if(!noiseBuf){
      var len = Math.floor(c.sampleRate * 0.3);
      noiseBuf = c.createBuffer(1, len, c.sampleRate);
      var data = noiseBuf.getChannelData(0);
      for(var i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    }
    var t0 = c.currentTime + delay;
    var src = c.createBufferSource();
    src.buffer = noiseBuf;
    var g = c.createGain();
    var f = c.createBiquadFilter();
    f.type = "lowpass";
    f.frequency.setValueAtTime(900, t0);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(f); f.connect(g); g.connect(c.destination);
    src.start(t0); src.stop(t0 + dur + 0.05);
  }
  function sfxFlap(){ if(muted) return; beep(0, 430, 780, 0.11, "triangle", 0.16); }
  function sfxScore(){
    if(muted) return;
    beep(0,    880, 880,  0.09, "sine", 0.15);
    beep(0.09, 1318, 1318, 0.16, "sine", 0.15);
  }
  function sfxMilestone(){
    if(muted) return;
    beep(0,    784, 784,  0.1, "sine", 0.14);
    beep(0.1,  988, 988,  0.1, "sine", 0.14);
    beep(0.2,  1568, 1568, 0.22, "sine", 0.16);
  }
  function sfxHit(){
    if(muted) return;
    noise(0, 0.22, 0.28);
    beep(0, 200, 55, 0.25, "square", 0.18);
  }
  function sfxOver(){
    if(muted) return;
    beep(0.05, 494, 494, 0.14, "triangle", 0.13);
    beep(0.2,  392, 392, 0.14, "triangle", 0.13);
    beep(0.35, 294, 294, 0.3,  "triangle", 0.13);
  }

  var muteBtn = document.getElementById("muteBtn");
  function renderMute(){ muteBtn.textContent = muted ? "🔇" : "🔊"; }
  function toggleMute(){
    muted = !muted;
    save(KEY_MUTE, muted ? 1 : 0);
    renderMute();
  }
  muteBtn.addEventListener("pointerdown", function(e){ e.stopPropagation(); });
  muteBtn.addEventListener("click", function(e){ e.stopPropagation(); toggleMute(); });
  renderMute();

  /* ========== DOM要素 ========== */
  var hudScore = document.getElementById("hudScore");
  var titleScreen = document.getElementById("titleScreen");
  var overScreen = document.getElementById("overScreen");
  var titleBestEl = document.getElementById("titleBest");
  var overScoreEl = document.getElementById("overScore");
  var overBestEl = document.getElementById("overBest");
  var newBadge = document.getElementById("newBadge");
  titleBestEl.textContent = best;

  /* ========== ゲーム状態 ========== */
  var STATE_TITLE = 0, STATE_PLAY = 1, STATE_DEAD = 2, STATE_OVER = 3;
  var state = STATE_TITLE;
  var score = 0;
  var overAt = 0;
  var time = 0;

  var bird = { x: 140, y: 360, vy: 0, r: 21, rot: 0, wingPhase: 0, wingT: 0 };

  var PIPE_W = 88;
  var pipes = [];        // { x, gy, gap, passed }
  var spawnAcc = 0;

  var particles = [];    // { type, x, y, vx, vy, life, max, ... }
  var clouds = [];
  var stars = [];
  var groundOff = 0;
  var farOff = 0, nearOff = 0;
  var shake = 0;
  var flash = 0;

  for(var i = 0; i < 46; i++){
    stars.push({ fx: Math.random(), fy: Math.random() * 0.42, tw: Math.random() * 6.28, s: 0.8 + Math.random() * 1.6 });
  }
  for(var j = 0; j < 6; j++){
    clouds.push({ fx: Math.random(), y: 90 + Math.random() * 260, s: 0.6 + Math.random() * 0.9, spd: 8 + Math.random() * 14 });
  }

  function speedNow(){ return 235 + Math.min(score, 45) * 2.6; }
  function gapNow(){ return Math.max(166, 232 - score * 2.0); }
  var SPACING = 315;

  function birdX(){ return Math.min(W * 0.32, 300); }

  function resetWorld(){
    pipes.length = 0;
    particles.length = 0;
    spawnAcc = SPACING - 470;
    bird.y = 360; bird.vy = 0; bird.rot = 0; bird.wingT = 0;
    score = 0;
    shake = 0; flash = 0;
  }

  function startGame(){
    resetWorld();
    state = STATE_PLAY;
    hudScore.textContent = "0";
    hudScore.classList.add("show");
    titleScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
  }

  function flap(){
    bird.vy = -560;
    bird.wingT = 1;
    sfxFlap();
    for(var i = 0; i < 3; i++){
      particles.push({
        type: "puff",
        x: bird.x - 8 + Math.random() * 10,
        y: bird.y + bird.r + 2,
        vx: -40 - Math.random() * 50,
        vy: 40 + Math.random() * 60,
        life: 0, max: 0.45 + Math.random() * 0.2,
        s: 3 + Math.random() * 4
      });
    }
  }

  function die(){
    if(state !== STATE_PLAY) return;
    state = STATE_DEAD;
    shake = 15;
    flash = 1;
    bird.vy = Math.min(bird.vy, -260);
    sfxHit();
    for(var i = 0; i < 12; i++){
      var a = Math.random() * 6.28;
      var sp = 90 + Math.random() * 220;
      particles.push({
        type: "feather",
        x: bird.x, y: bird.y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 90,
        life: 0, max: 0.9 + Math.random() * 0.7,
        rot: Math.random() * 6.28,
        vr: (Math.random() - 0.5) * 9,
        s: 4 + Math.random() * 5
      });
    }
  }

  function finishGame(){
    state = STATE_OVER;
    overAt = performance.now();
    var isNew = score > best;
    if(isNew){
      best = score;
      save(KEY_BEST, best);
    }
    overScoreEl.textContent = score;
    overBestEl.textContent = best;
    titleBestEl.textContent = best;
    newBadge.classList.toggle("hidden", !isNew);
    hudScore.classList.remove("show");
    overScreen.classList.remove("hidden");
    sfxOver();
  }

  function addScore(){
    score++;
    hudScore.textContent = String(score);
    hudScore.classList.remove("bump");
    void hudScore.offsetWidth;
    hudScore.classList.add("bump");
    var milestone = score % 10 === 0;
    if(milestone) sfxMilestone(); else sfxScore();
    particles.push({
      type: "pop",
      x: bird.x + 30, y: bird.y - 34,
      vx: 0, vy: -70,
      life: 0, max: 0.85,
      text: milestone ? score + "!" : "+1",
      gold: milestone
    });
  }

  /* ========== 入力 ========== */
  function action(){
    if(state === STATE_TITLE){
      startGame();
      flap();
    }else if(state === STATE_PLAY){
      flap();
    }else if(state === STATE_OVER){
      if(performance.now() - overAt > 500){
        startGame();
        flap();
      }
    }
  }
  document.addEventListener("pointerdown", function(e){
    if(e.target && e.target.closest && e.target.closest("#muteBtn")) return;
    e.preventDefault();
    action();
  }, { passive: false });
  window.addEventListener("keydown", function(e){
    if(e.repeat) return;
    if(e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Enter"){
      e.preventDefault();
      action();
    }else if(e.code === "KeyM"){
      toggleMute();
    }
  });
  canvas.addEventListener("contextmenu", function(e){ e.preventDefault(); });

  /* ========== 更新 ========== */
  function update(dt){
    time += dt;
    bird.x = birdX();

    var spd = (state === STATE_PLAY) ? speedNow() :
              (state === STATE_TITLE) ? 60 : 0;

    farOff += spd * 0.18 * dt;
    nearOff += spd * 0.38 * dt;
    groundOff = (groundOff + spd * dt) % 48;

    for(var c = 0; c < clouds.length; c++){
      var cl = clouds[c];
      cl.fx -= (cl.spd + spd * 0.06) * dt / Math.max(W, 1);
      if(cl.fx < -0.25){ cl.fx = 1.2; cl.y = 90 + Math.random() * 260; }
    }

    if(state === STATE_TITLE){
      bird.y = 360 + Math.sin(time * 2.4) * 16;
      bird.rot = Math.sin(time * 2.4 + 0.6) * 0.12;
      bird.wingPhase += dt * 7;
    }else if(state === STATE_PLAY || state === STATE_DEAD){
      bird.vy = Math.min(bird.vy + 1750 * dt, 950);
      bird.y += bird.vy * dt;
      bird.wingPhase += dt * (state === STATE_PLAY ? 13 : 4);
      bird.wingT = Math.max(0, bird.wingT - dt * 4);

      var targetRot = (state === STATE_DEAD) ? 1.5 :
                      (bird.vy < 0 ? -0.38 : Math.min(1.35, bird.vy / 480));
      bird.rot += (targetRot - bird.rot) * Math.min(1, dt * 9);

      if(bird.y < bird.r + 4){
        bird.y = bird.r + 4;
        bird.vy = 0;
      }
      if(bird.y > GROUND_Y - bird.r){
        bird.y = GROUND_Y - bird.r;
        if(state === STATE_PLAY) die();
        if(state === STATE_DEAD) finishGame();
      }
    }

    if(state === STATE_PLAY){
      spawnAcc += spd * dt;
      if(spawnAcc >= SPACING){
        spawnAcc = 0;
        var gap = gapNow();
        var lo = gap / 2 + 90;
        var hi = GROUND_Y - gap / 2 - 90;
        pipes.push({ x: W + 40, gy: lo + Math.random() * (hi - lo), gap: gap, passed: false });
      }
      for(var p = pipes.length - 1; p >= 0; p--){
        var pi = pipes[p];
        pi.x -= spd * dt;
        if(!pi.passed && pi.x + PIPE_W < bird.x - bird.r){
          pi.passed = true;
          addScore();
        }
        if(pi.x < -PIPE_W - 60) pipes.splice(p, 1);
      }
      // 当たり判定(少し甘めの円)
      var cr = bird.r * 0.74;
      for(var k = 0; k < pipes.length; k++){
        var pk = pipes[k];
        if(bird.x + cr > pk.x && bird.x - cr < pk.x + PIPE_W){
          var topEnd = pk.gy - pk.gap / 2;
          var botStart = pk.gy + pk.gap / 2;
          if(bird.y - cr < topEnd || bird.y + cr > botStart){
            die();
            break;
          }
        }
      }
    }

    for(var q = particles.length - 1; q >= 0; q--){
      var pt = particles[q];
      pt.life += dt;
      if(pt.life >= pt.max){ particles.splice(q, 1); continue; }
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      if(pt.type === "feather"){
        pt.vy += 420 * dt;
        pt.vx *= (1 - 1.6 * dt);
        pt.rot += pt.vr * dt;
      }else if(pt.type === "puff"){
        pt.vy *= (1 - 2.5 * dt);
        pt.vx *= (1 - 2.5 * dt);
      }
    }

    shake = Math.max(0, shake - dt * 34);
    flash = Math.max(0, flash - dt * 3.2);
  }

  /* ========== 描画 ========== */
  function mountainY(x, off, base, a1, f1, a2, f2, ph){
    var wx = x + off;
    return base - a1 * Math.sin(wx * f1) - a2 * Math.sin(wx * f2 + ph);
  }
  function drawMountains(off, base, a1, f1, a2, f2, ph, color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for(var x = 0; x <= W + 30; x += 26){
      ctx.lineTo(x, mountainY(x, off, base, a1, f1, a2, f2, ph));
    }
    ctx.lineTo(W + 30, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawPipe(px, yTop, yBot){
    // 胴体
    var g = ctx.createLinearGradient(px, 0, px + PIPE_W, 0);
    g.addColorStop(0,   "#245c49");
    g.addColorStop(0.28,"#57b184");
    g.addColorStop(0.55,"#3f8f68");
    g.addColorStop(1,   "#1d4a3a");
    ctx.fillStyle = g;
    ctx.fillRect(px, -20, PIPE_W, yTop + 20);
    ctx.fillRect(px, yBot, PIPE_W, GROUND_Y - yBot);
    // ハイライト
    ctx.fillStyle = "rgba(255,255,255,0.22)";
    ctx.fillRect(px + 13, -20, 8, yTop + 20);
    ctx.fillRect(px + 13, yBot, 8, GROUND_Y - yBot);
    // 縁(リム)
    var rimH = 30, rimX = px - 7, rimW = PIPE_W + 14;
    var rg = ctx.createLinearGradient(rimX, 0, rimX + rimW, 0);
    rg.addColorStop(0,   "#2c6b55");
    rg.addColorStop(0.3, "#6cc497");
    rg.addColorStop(1,   "#225344");
    ctx.fillStyle = rg;
    roundRect(rimX, yTop - rimH, rimW, rimH, 7);
    roundRect(rimX, yBot, rimW, rimH, 7);
    // リムの陰
    ctx.fillStyle = "rgba(20,32,28,0.35)";
    ctx.fillRect(px, yTop - 4, PIPE_W, 4);
    ctx.fillRect(px, yBot + rimH, PIPE_W, 4);
  }
  function roundRect(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
  }

  function drawBird(){
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);

    // しっぽ
    ctx.fillStyle = "#5b4a63";
    ctx.beginPath();
    ctx.moveTo(-14, -3);
    ctx.lineTo(-30, -9);
    ctx.lineTo(-27, 6);
    ctx.closePath();
    ctx.fill();

    // からだ
    var bg = ctx.createRadialGradient(-5, -7, 4, 0, 0, 26);
    bg.addColorStop(0, "#fffdf7");
    bg.addColorStop(1, "#f1e3cd");
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(0, 0, bird.r, 0, 6.2832);
    ctx.fill();
    ctx.strokeStyle = "rgba(70,45,80,0.35)";
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // 頭のワンポイント
    ctx.fillStyle = "#e8d3b8";
    ctx.beginPath();
    ctx.arc(-2, 10, 12, 0, 6.2832);
    ctx.fill();

    // つばさ
    var wingA = Math.sin(bird.wingPhase) * 0.32 - bird.wingT * 1.05;
    ctx.save();
    ctx.translate(-5, 1);
    ctx.rotate(wingA);
    ctx.fillStyle = "#e9dac2";
    ctx.beginPath();
    ctx.ellipse(-6, 4, 13, 8, 0.5, 0, 6.2832);
    ctx.fill();
    ctx.strokeStyle = "rgba(70,45,80,0.3)";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // くちばし
    ctx.fillStyle = "#f2a03d";
    ctx.beginPath();
    ctx.moveTo(16, -4);
    ctx.lineTo(28, 0);
    ctx.lineTo(16, 5);
    ctx.closePath();
    ctx.fill();

    // め
    ctx.fillStyle = "#2c1e33";
    ctx.beginPath();
    ctx.arc(8, -6, 3.6, 0, 6.2832);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(9.2, -7.2, 1.2, 0, 6.2832);
    ctx.fill();

    // ほっぺ
    ctx.fillStyle = "rgba(246,150,150,0.55)";
    ctx.beginPath();
    ctx.arc(12, 3, 4.2, 0, 6.2832);
    ctx.fill();

    ctx.restore();
  }

  function render(){
    ctx.setTransform(S, 0, 0, S, 0, 0);
    var sx = 0, sy = 0;
    if(shake > 0){
      sx = (Math.random() - 0.5) * shake;
      sy = (Math.random() - 0.5) * shake;
    }
    ctx.translate(sx, sy);

    // 空
    ctx.fillStyle = skyGrad;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // 星
    for(var i = 0; i < stars.length; i++){
      var st = stars[i];
      var tw = 0.25 + 0.75 * Math.abs(Math.sin(time * 1.7 + st.tw));
      ctx.globalAlpha = tw * (1 - st.fy * 1.6);
      ctx.fillStyle = "#fff3dd";
      ctx.fillRect(st.fx * W, st.fy * H, st.s, st.s);
    }
    ctx.globalAlpha = 1;

    // 夕日
    var sunX = W * 0.72, sunY = H * 0.60;
    ctx.fillStyle = "rgba(255,214,140,0.22)";
    ctx.beginPath(); ctx.arc(sunX, sunY, 112, 0, 6.2832); ctx.fill();
    ctx.fillStyle = "rgba(255,224,166,0.9)";
    ctx.beginPath(); ctx.arc(sunX, sunY, 66, 0, 6.2832); ctx.fill();

    // 雲
    for(var c = 0; c < clouds.length; c++){
      var cl = clouds[c];
      var cx = cl.fx * W, cy = cl.y, cs = cl.s;
      ctx.fillStyle = "rgba(255,230,220,0.28)";
      ctx.beginPath();
      ctx.ellipse(cx, cy, 52 * cs, 15 * cs, 0, 0, 6.2832);
      ctx.ellipse(cx + 30 * cs, cy - 8 * cs, 30 * cs, 12 * cs, 0, 0, 6.2832);
      ctx.ellipse(cx - 32 * cs, cy - 4 * cs, 26 * cs, 10 * cs, 0, 0, 6.2832);
      ctx.fill();
    }

    // 山なみ(遠→近)
    drawMountains(farOff,  H * 0.665, 58, 0.004, 30, 0.011, 2.1, "#4c2f68");
    drawMountains(nearOff, H * 0.755, 76, 0.005, 36, 0.013, 4.6, "#38204e");

    // 土管
    for(var p = 0; p < pipes.length; p++){
      var pi = pipes[p];
      drawPipe(pi.x, pi.gy - pi.gap / 2, pi.gy + pi.gap / 2);
    }

    // 地面
    ctx.fillStyle = "#2a1740";
    ctx.fillRect(-20, GROUND_Y, W + 40, H - GROUND_Y + 20);
    ctx.fillStyle = "#47935f";
    ctx.fillRect(-20, GROUND_Y, W + 40, 15);
    ctx.fillStyle = "#2f6b46";
    for(var gx = -groundOff; gx < W + 48; gx += 48){
      ctx.beginPath();
      ctx.moveTo(gx, GROUND_Y + 15);
      ctx.lineTo(gx + 10, GROUND_Y + 4);
      ctx.lineTo(gx + 20, GROUND_Y + 15);
      ctx.closePath();
      ctx.fill();
    }
    ctx.strokeStyle = "rgba(255,190,150,0.08)";
    ctx.lineWidth = 3;
    for(var gl = -groundOff; gl < W + 48; gl += 48){
      ctx.beginPath();
      ctx.moveTo(gl, H);
      ctx.lineTo(gl + 26, GROUND_Y + 15);
      ctx.stroke();
    }

    // パーティクル
    for(var q = 0; q < particles.length; q++){
      var pt = particles[q];
      var t = pt.life / pt.max;
      var a = 1 - t;
      if(pt.type === "puff"){
        ctx.globalAlpha = a * 0.6;
        ctx.fillStyle = "#fff2e0";
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.s * (1 + t), 0, 6.2832);
        ctx.fill();
      }else if(pt.type === "feather"){
        ctx.globalAlpha = a;
        ctx.save();
        ctx.translate(pt.x, pt.y);
        ctx.rotate(pt.rot);
        ctx.fillStyle = "#f6ecd9";
        ctx.beginPath();
        ctx.ellipse(0, 0, pt.s, pt.s * 0.45, 0, 0, 6.2832);
        ctx.fill();
        ctx.restore();
      }else if(pt.type === "pop"){
        ctx.globalAlpha = a;
        ctx.font = "900 " + (pt.gold ? 40 : 30) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.fillStyle = pt.gold ? "#ffd166" : "#fff8f0";
        ctx.strokeStyle = "rgba(60,25,60,0.6)";
        ctx.lineWidth = 5;
        ctx.strokeText(pt.text, pt.x, pt.y);
        ctx.fillText(pt.text, pt.x, pt.y);
      }
    }
    ctx.globalAlpha = 1;

    // とり
    drawBird();

    // ヒットフラッシュ
    if(flash > 0){
      ctx.globalAlpha = flash * 0.8;
      ctx.fillStyle = "#fff";
      ctx.fillRect(-20, -20, W + 40, H + 40);
      ctx.globalAlpha = 1;
    }

    // ビネット
    ctx.fillStyle = "rgba(20,8,36,0.16)";
    ctx.fillRect(-20, -20, W + 40, 90);
  }

  /* ========== メインループ ========== */
  var last = performance.now();
  function frame(now){
    var dt = Math.min((now - last) / 1000, 0.033);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
